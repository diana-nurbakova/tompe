# MT System Configuration
# Store actual API keys in .env file, not here.

mt_systems:
  google:
    enabled: false
    type: "dedicated_mt"
    # api_key sourced from GOOGLE_TRANSLATE_API_KEY env var

  deepl:
    enabled: true
    type: "dedicated_mt"
    use_pro: true  # Set to true for api.deepl.com (pro), false for api-free.deepl.com
    # api_key sourced from DEEPL_AUTH_KEY env var

  gpt4:
    enabled: true
    type: "general_llm"
    provider: "openai"
    model: "gpt-4.1"
    prompt_strategy: "zero_shot"

  claude:
    enabled: true
    type: "general_llm"
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    prompt_strategy: "domain_context"

  ollama:
    enabled: true
    type: "general_llm"
    provider: "ollama"
    model: "llama3"  # Model available on the remote Ollama server
    prompt_strategy: "zero_shot"

  together:
    enabled: true
    type: "general_llm"
    provider: "together"
    model: "deepseek-ai/DeepSeek-V3"
    prompt_strategy: "zero_shot"

# LLM used for error injection and explanation generation
# Can be any provider: openai, anthropic, ollama, together
injection_llm:
  provider: "openai"
  model: "gpt-4.1"
  temperature: 0.3
  max_tokens: 4096
